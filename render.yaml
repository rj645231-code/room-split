services:
  - type: web
    name: room-split
    runtime: node
    region: singapore
    plan: free

    # npm install triggers postinstall → installs client + server deps
    # npm run build → vite build for the React client
    buildCommand: npm install && npm run build

    # Start Express (serves built React + /api routes)
    startCommand: npm start

    # Health check
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: npm_config_build_from_source
        value: "true"
